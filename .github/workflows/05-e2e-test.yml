name: End-to-End Test

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ========================================
      # STEP 1: Terraform Apply (Create Infrastructure)
      # ========================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=aicouncil/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Get EC2 IP
        id: get-ip
        working-directory: terraform
        run: |
          EC2_IP=$(terraform output -raw ec2_public_ip)
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT
          echo "✅ EC2 Instance created at: $EC2_IP"

      # ========================================
      # STEP 2: Build and Push Docker Image
      # ========================================
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/aicouncil:$IMAGE_TAG .
          docker push $ECR_REGISTRY/aicouncil:$IMAGE_TAG
          docker tag $ECR_REGISTRY/aicouncil:$IMAGE_TAG $ECR_REGISTRY/aicouncil:latest
          docker push $ECR_REGISTRY/aicouncil:latest
          echo "✅ Image pushed: $ECR_REGISTRY/aicouncil:$IMAGE_TAG"

      # ========================================
      # STEP 3: Wait for EC2 to be ready
      # ========================================
      - name: Wait for EC2 to be ready
        env:
          EC2_IP: ${{ steps.get-ip.outputs.ec2_ip }}
        run: |
          echo "⏳ Waiting for EC2 instance to complete initialization..."
          echo "This can take 3-5 minutes for K3s to install and start..."
          
          # Wait up to 10 minutes for SSH to be available
          for i in {1..60}; do
            if nc -z -w5 $EC2_IP 22 2>/dev/null; then
              echo "✅ SSH is available"
              break
            fi
            echo "Attempt $i/60: SSH not ready yet..."
            sleep 10
          done
          
          # Give K3s more time to fully initialize
          echo "⏳ Waiting additional 2 minutes for K3s to fully initialize..."
          sleep 120

      # ========================================
      # STEP 4: Deploy to K3s (via user-data or manual)
      # ========================================
      - name: Check K3s Status
        env:
          EC2_IP: ${{ steps.get-ip.outputs.ec2_ip }}
        run: |
          echo "📊 Checking K3s status..."
          # For now, we'll just wait - user-data should handle deployment
          # In next iteration, we can add actual deployment logic here

      # ========================================
      # STEP 5: Wait for Application to be Ready
      # ========================================
      - name: Wait for Application
        env:
          EC2_IP: ${{ steps.get-ip.outputs.ec2_ip }}
        run: |
          echo "⏳ Waiting for application to be ready..."

          # Wait up to 5 minutes for the app to respond
          for i in {1..30}; do
            if curl -f -s http://$EC2_IP:30080/health > /dev/null 2>&1; then
              echo "✅ Application is responding!"
              break
            fi
            echo "Attempt $i/30: Application not ready yet..."
            sleep 10
          done

      # ========================================
      # STEP 6: Validate Deployment
      # ========================================
      - name: Validate Health Endpoint
        env:
          EC2_IP: ${{ steps.get-ip.outputs.ec2_ip }}
        run: |
          echo "🔍 Testing health endpoint..."
          RESPONSE=$(curl -s http://$EC2_IP:30080/health)
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q "status"; then
            echo "✅ Health check passed!"
          else
            echo "❌ Health check failed!"
            exit 1
          fi

      - name: Test API Docs
        env:
          EC2_IP: ${{ steps.get-ip.outputs.ec2_ip }}
        run: |
          echo "🔍 Testing API docs endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:30080/docs)

          if [ "$STATUS" = "200" ]; then
            echo "✅ API docs accessible!"
          else
            echo "❌ API docs returned status: $STATUS"
            exit 1
          fi

      # ========================================
      # STEP 7: Summary
      # ========================================
      - name: E2E Test Summary
        if: always()
        env:
          EC2_IP: ${{ steps.get-ip.outputs.ec2_ip }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "## 🎉 End-to-End Test Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "- **EC2 IP:** $EC2_IP" >> $GITHUB_STEP_SUMMARY
          echo "- **Application URL:** http://$EC2_IP:30080" >> $GITHUB_STEP_SUMMARY
          echo "- **API Docs:** http://$EC2_IP:30080/docs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** $ECR_REGISTRY/aicouncil:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Commands" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Health check" >> $GITHUB_STEP_SUMMARY
          echo "curl http://$EC2_IP:30080/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Test convergence API" >> $GITHUB_STEP_SUMMARY
          echo "curl -X POST http://$EC2_IP:30080/converge \\" >> $GITHUB_STEP_SUMMARY
          echo "  -H 'Content-Type: application/json' \\" >> $GITHUB_STEP_SUMMARY
          echo "  -d '{\"content\": \"# Test\", \"models\": [\"critic1\"], \"max_iterations\": 2}'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Remember to run the Destroy workflow when done testing!**" >> $GITHUB_STEP_SUMMARY


