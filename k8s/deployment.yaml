apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicouncil
  labels:
    app: aicouncil
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aicouncil
  template:
    metadata:
      labels:
        app: aicouncil
    spec:
      containers:
      - name: aicouncil
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: aicouncil-secrets
              key: GROQ_API_KEY
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: aicouncil-secrets
              key: GOOGLE_API_KEY
        - name: PORT
          value: "8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

